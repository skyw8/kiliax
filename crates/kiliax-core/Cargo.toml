[package]
name = "kiliax-core"
edition.workspace = true
version.workspace = true

[dependencies]
async-openai = { version = "0.28", features = ["byot"] }
async-trait = "0.1"
dirs.workspace = true
grep-matcher = "0.1"
grep-regex = "0.1"
grep-searcher = "0.1"
ignore = "0.4"
modelcontextprotocol-client = "0.1.3"
mcp-protocol = "=0.2.6"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
secrecy = "0.10"
serde.workspace = true
serde_json = "1"
serde_yaml.workspace = true
thiserror.workspace = true
time = { version = "0.3", features = ["formatting", "macros"] }
tokio = { version = "1", features = ["rt", "sync", "process", "fs", "io-util", "time"] }
tokio-stream = "0.1"
tracing = "0.1"

[dev-dependencies]
tempfile.workspace = true
