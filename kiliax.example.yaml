# Model id format: <provider>/<model>
default_model: moonshot_cn/kimi-k2-turbo-preview

# Default agent name for new sessions (optional).
default_agent: general

# Session-control server (optional).
# CLI flags override these values.
server:
  host: 127.0.0.1
  port: 8123
  # token is optional when host is loopback. Recommended for non-loopback binds (e.g. 0.0.0.0).
  # token: your-long-random-token
  # Optional: server-side limits (defaults shown).
  # max_live_sessions: 64
  # live_session_idle_ttl_secs: 900
  # idempotency_max_entries: 1024
  # idempotency_ttl_secs: 600
  # events_ring_size: 4096

# OpenTelemetry (optional).
otel:
  enabled: false
  environment: dev
  otlp:
    # Base endpoint for your OTEL Collector.
    # HTTP: http://localhost:4318
    # gRPC: http://localhost:4317
    #
    # Langfuse (OTLP ingest):
    # - endpoint: https://<LANGFUSE_HOST>/api/public/otel
    # - headers.authorization: Basic <base64(public_key:secret_key)>
    #   (tip) echo -n "$LANGFUSE_PUBLIC_KEY:$LANGFUSE_SECRET_KEY" | base64 | tr -d '\n'
    #
    # Example:
    #   endpoint: https://cloud.langfuse.com/api/public/otel
    #   protocol: http_protobuf
    #   headers:
    #     authorization: Basic <...>
    endpoint: http://localhost:4318
    # http_protobuf (default) | http_json | grpc
    protocol: http_protobuf
    # Extra exporter headers (e.g. auth tokens).
    headers: {}
    # Optional mTLS / custom CA (paths).
    # tls:
    #   ca_cert: /path/to/ca.pem
    #   client_cert: /path/to/client.pem
    #   client_key: /path/to/client.key
  signals:
    logs: true
    traces: true
    metrics: true
  capture:
    # metadata | full
    mode: full
    # Truncate any captured text fields (prompt/response/tool args/output).
    max_bytes: 65536
    # Never export base64 image data; only paths/metadata.
    include_images: false
    # none | sha256
    hash: sha256

# Agent runtime options (optional).
runtime:
  # Maximum number of ReAct steps in a single run.
  max_steps: 8
  # Optional: auto-compact conversation history when context grows large.
  # auto_compact_token_limit: 120000

# Per-agent overrides (optional, applied after `runtime`).
agents:
  plan:
    max_steps: 16
  general:
    max_steps: 8

# Web search (optional, Tavily).
# If omitted, the web_search tool falls back to env vars:
# - TAVILY_API_KEY
# - TAVILY_API_BASE_URL (default: https://api.tavily.com)
web_search:
  base_url: https://api.tavily.com
  api_key: tvly-your-key

# MCP servers (optional).
#
# Kiliax currently supports MCP over stdio (command + args). Each server's tools
# will be exposed as: `mcp__<server>__<tool>`.
mcp:
  servers:
    # Context7 (docs / library API reference). Requires Node.js + `npx`.
    # Install/usage: https://context7.com/docs/installation
    - name: context7
      # Optional: disable without removing config.
      enable: true
      command: npx
      args:
        - -y
        - "@upstash/context7-mcp@latest"
        - --api-key
        - ctx7-your-api-key

providers:
  moonshot_cn:
    # api defaults to openai_chat_completions when omitted.
    api: openai_chat_completions
    base_url: https://api.moonshot.cn/v1
    # api_key is optional for endpoints that do not require auth.
    # Support key names: api_key / apikey / apiKey
    api_key: sk-your-key
    models:
      - kimi-k2-turbo-preview

  openai:
    api: openai_chat_completions
    base_url: https://api.openai.com/v1
    # api_key is optional for endpoints that do not require auth.
    # Support key names: api_key / apikey / apiKey
    api_key: sk-your-key
    models:
      - gpt-4o-mini
      - gpt-4o

  anthropic:
    api: anthropic_messages
    # Either https://api.anthropic.com or https://api.anthropic.com/v1 works.
    # Kiliax calls the Anthropic Messages API at /v1/messages.
    base_url: https://api.anthropic.com/v1
    api_key: sk-ant-your-key
    models:
      - claude-3-5-sonnet-latest
